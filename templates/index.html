<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Title Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

</head>
<body>
    <h1>Predict Your Job Title</h1>
    <form method="POST">
        <label for="industry">Industry:</label>
        <input type="text" id="industry" name="industry" required><br><br>

        <label for="role_category">Role Category:</label>
        <input type="text" id="role_category" name="role_category" required><br><br>

        <label for="functional_area">Functional Area:</label>
        <input type="text" id="functional_area" name="functional_area" required><br><br>

        <label for="experience">Job Experience Required (years):</label>
        <input type="number" id="experience" name="experience" required><br><br>

        <label for="salary">Expected Job Salary:</label>
        <input type="text" id="salary" name="salary" required><br><br>

        <label for="skills">Skills (comma separated):</label>
        <input type="text" id="skills" name="skills" required><br><br>

        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <h2>Predicted Job Title: {{ prediction }}</h2>
    {% endif %}
</body>
</html>
